name: Generate Datas

on:
  schedule: # Executa automaticamente a cada 24 horas
    - cron: "0 */24 * * *"
  workflow_dispatch: # Permite que você execute manualmente quando quiser

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Gera a animação a partir do seu histórico de contribuições do GitHub
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#007acc&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#38bdf8
        id: snake-gif

      # Envia os arquivos gerados para a branch 'output'
      - name: Push status
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
